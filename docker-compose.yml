name: trading-2-0

x-fluent-bit-logging: &fluent-bit-logging
  driver: fluentd
  options:
    fluentd-address: "localhost:24224"
    fluentd-async: "true"
    tag: "{{.Name}}"

services:
  postgres:
    image: postgres:17-alpine
    container_name: trading-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_2_0}
      POSTGRES_USER: ${POSTGRES_USER:-trading_app}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *fluent-bit-logging
    networks:
      - trading

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *fluent-bit-logging
    networks:
      - trading

  loki:
    image: grafana/loki:3.5.8
    container_name: trading-loki
    command: ["-config.file=/etc/loki/loki.yml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./deploy/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    logging: *fluent-bit-logging
    networks:
      - trading

  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: trading-fluent-bit
    depends_on:
      loki:
        condition: service_healthy
    ports:
      - "${FLUENT_BIT_HTTP_PORT:-2020}:2020"
      - "${FLUENT_BIT_FORWARD_PORT:-24224}:24224"
    volumes:
      - ./deploy/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./deploy/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    healthcheck:
      test: ["CMD", "/fluent-bit/bin/fluent-bit", "--version"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - trading

  prometheus:
    image: prom/prometheus:v3.8.1
    container_name: trading-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *fluent-bit-logging
    networks:
      - trading

  grafana:
    image: grafana/grafana:12.3.0
    container_name: trading-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
    secrets:
      - grafana_admin_password
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    logging: *fluent-bit-logging
    networks:
      - trading

  trade-core:
    build:
      context: .
      dockerfile: deploy/docker/python-service.Dockerfile
    container_name: trading-trade-core
    command: ["python", "-m", "trade_core.service"]
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      TRADING_RUNTIME_MODE: ${TRADING_RUNTIME_MODE:-historical_replay}
      TBANK_FULL_ACCESS_TOKEN_FILE: /run/secrets/tbank_full_access_token
      TBANK_READONLY_TOKEN_FILE: /run/secrets/tbank_readonly_token
    secrets:
      - tbank_full_access_token
      - tbank_readonly_token
    ports:
      - "${TRADE_CORE_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *fluent-bit-logging
    networks:
      - trading

  api:
    build:
      context: .
      dockerfile: deploy/docker/python-service.Dockerfile
    container_name: trading-api
    command: ["python", "-m", "trading_api.service"]
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      TRADING_RUNTIME_MODE: ${TRADING_RUNTIME_MODE:-historical_replay}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-trading_2_0}
      POSTGRES_USER: ${POSTGRES_USER:-trading_app}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    secrets:
      - postgres_password
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      trade-core:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *fluent-bit-logging
    networks:
      - trading

  report-worker:
    build:
      context: .
      dockerfile: deploy/docker/python-service.Dockerfile
    container_name: trading-report-worker
    command: ["python", "-m", "report_worker.service"]
    environment:
      HOST: 0.0.0.0
      PORT: 8002
      TRADING_RUNTIME_MODE: ${TRADING_RUNTIME_MODE:-historical_replay}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-trading_2_0}
      POSTGRES_USER: ${POSTGRES_USER:-trading_app}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    secrets:
      - postgres_password
    ports:
      - "${REPORT_WORKER_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *fluent-bit-logging
    networks:
      - trading

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
    container_name: trading-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *fluent-bit-logging
    networks:
      - trading

secrets:
  tbank_full_access_token:
    file: ./secrets/tbank_full_access_token
  tbank_readonly_token:
    file: ./secrets/tbank_readonly_token
  postgres_password:
    file: ./secrets/postgres_password
  grafana_admin_password:
    file: ./secrets/grafana_admin_password

volumes:
  postgres_data:
  redis_data:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  trading:
    name: trading-2-0
