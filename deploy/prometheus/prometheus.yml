global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: trade-core
    metrics_path: /metrics
    static_configs:
      - targets: ["trade-core:8001"]

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: report-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["report-worker:8002"]
